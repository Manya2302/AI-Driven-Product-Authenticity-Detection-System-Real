<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Product Authenticity Detection</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body class="bg-gradient">
    <div class="container mx-auto px-4 min-h-screen flex items-center justify-center">
        <div class="auth-card">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-900 mb-2">Welcome Back</h1>
                <p class="text-gray-600">Sign in to your account to continue</p>
            </div>

            <div id="error-message" class="alert alert-danger hidden mb-4"></div>

            <form id="login-form" class="space-y-6">
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-input" 
                        placeholder="your@email.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        placeholder="••••••••"
                        required
                    >
                </div>

                <div class="flex items-center justify-between">
                    <label class="flex items-center">
                        <input type="checkbox" id="remember" class="mr-2">
                        <span class="text-sm text-gray-600">Remember me</span>
                    </label>
                    <a href="#" class="text-sm text-primary-600 hover:text-primary-700">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary w-full" id="login-btn">
                    <span id="btn-text">Sign In</span>
                    <span id="btn-loading" class="hidden">
                        <svg class="animate-spin h-5 w-5 inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        Signing in...
                    </span>
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-gray-600">
                    Don't have an account?
                    <a href="signup.html" class="text-primary-600 hover:text-primary-700 font-semibold">Sign up</a>
                </p>
            </div>

            <div class="mt-8 pt-6 border-t border-gray-200 text-center">
                <a href="landing.html" class="text-sm text-gray-500 hover:text-gray-700">← Back to Home</a>
            </div>
        </div>
    </div>

    <script src="../js/api-client.js"></script>
    <script>
        const apiClient = new APIClient();
        const form = document.getElementById('login-form');
        const errorMessage = document.getElementById('error-message');
        const btnText = document.getElementById('btn-text');
        const btnLoading = document.getElementById('btn-loading');
        const loginBtn = document.getElementById('login-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Clear previous errors
            errorMessage.classList.add('hidden');
            
            // Get form data
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Show loading state
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');
            loginBtn.disabled = true;

            try {
                const response = await apiClient.login(email, password);
                
                if (response.access_token) {
                    // Login successful
                    const user = response.user;
                    
                    // Redirect based on role
                    if (user.role === 'admin') {
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        window.location.href = 'user-dashboard.html';
                    }
                } else {
                    throw new Error('Invalid response from server');
                }
            } catch (error) {
                // Show error message
                errorMessage.textContent = error.message || 'Login failed. Please check your credentials.';
                errorMessage.classList.remove('hidden');
                
                // Reset button state
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
                loginBtn.disabled = false;
            }
        });

        // Check if already logged in
        if (apiClient.isAuthenticated()) {
            // Fetch user info and redirect
            apiClient.getCurrentUser().then(user => {
                if (user.role === 'admin') {
                    window.location.href = 'admin-dashboard.html';
                } else {
                    window.location.href = 'user-dashboard.html';
                }
            }).catch(() => {
                // If fetching user fails, stay on login page
            });
        }
    </script>
</body>
</html>
