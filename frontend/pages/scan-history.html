<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan History - AI Product Authenticity Detection</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-8">
                    <a href="user-dashboard.html" class="text-xl font-bold text-primary-600">AI Authenticity</a>
                    <div class="hidden md:flex space-x-6">
                        <a href="user-dashboard.html" class="nav-link">Dashboard</a>
                        <a href="scan-product.html" class="nav-link">Scan Product</a>
                        <a href="scan-history.html" class="nav-link active">History</a>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="logout-btn" class="btn btn-secondary btn-sm">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Scan History</h1>
            <p class="text-gray-600">View all your previous product authenticity scans</p>
        </div>

        <!-- Filters -->
        <div class="card mb-6">
            <div class="flex flex-wrap items-center gap-4">
                <div class="flex-1 min-w-[200px]">
                    <input 
                        type="text" 
                        id="search-input" 
                        class="form-input" 
                        placeholder="Search by product name..."
                    >
                </div>
                <div>
                    <select id="filter-classification" class="form-input">
                        <option value="">All Results</option>
                        <option value="likely_real">Authentic</option>
                        <option value="suspicious">Suspicious</option>
                        <option value="likely_fake">Fake</option>
                    </select>
                </div>
                <button id="filter-btn" class="btn btn-secondary">Apply Filters</button>
            </div>
        </div>

        <!-- Scans Table -->
        <div class="card">
            <div id="scans-container">
                <div class="text-center py-8">
                    <div class="spinner"></div>
                    <p class="text-gray-500 mt-4">Loading scan history...</p>
                </div>
            </div>

            <!-- Pagination -->
            <div id="pagination" class="mt-6 flex items-center justify-between border-t border-gray-200 pt-4 hidden">
                <div class="text-sm text-gray-600">
                    Showing <span id="showing-from">0</span> to <span id="showing-to">0</span> of <span id="total-scans">0</span> scans
                </div>
                <div class="flex items-center space-x-2">
                    <button id="prev-btn" class="btn btn-secondary btn-sm" disabled>Previous</button>
                    <div id="page-numbers" class="flex items-center space-x-1"></div>
                    <button id="next-btn" class="btn btn-secondary btn-sm">Next</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/api-client.js"></script>
    <script>
        const apiClient = new APIClient();

        // Check authentication
        if (!apiClient.isAuthenticated()) {
            window.location.href = 'login.html';
        }

        let currentPage = 1;
        const pageSize = 10;
        let totalScans = 0;
        let scansData = [];

        // Load scans
        async function loadScans(page = 1) {
            try {
                const searchQuery = document.getElementById('search-input').value;
                const classification = document.getElementById('filter-classification').value;

                const response = await apiClient.getScanHistory(page, pageSize);
                scansData = response.scans || [];
                totalScans = response.total || 0;
                currentPage = page;

                // Apply filters
                let filteredScans = scansData;
                if (searchQuery) {
                    filteredScans = filteredScans.filter(scan => 
                        scan.product_name.toLowerCase().includes(searchQuery.toLowerCase())
                    );
                }
                if (classification) {
                    filteredScans = filteredScans.filter(scan => 
                        scan.classification === classification
                    );
                }

                displayScans(filteredScans);
                updatePagination();
            } catch (error) {
                console.error('Failed to load scans:', error);
                showError('Failed to load scan history');
            }
        }

        function displayScans(scans) {
            const container = document.getElementById('scans-container');

            if (scans.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <svg class="w-16 h-16 text-gray-400 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                        </svg>
                        <p class="text-gray-500 mb-4">No scans found</p>
                        <a href="scan-product.html" class="btn btn-primary">Scan Your First Product</a>
                    </div>
                `;
                return;
            }

            const table = `
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Product
                                </th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Result
                                </th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Confidence
                                </th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Date
                                </th>
                                <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    Actions
                                </th>
                            </tr>
                        </thead>
                        <tbody class="bg-white divide-y divide-gray-200">
                            ${scans.map(scan => createScanRow(scan)).join('')}
                        </tbody>
                    </table>
                </div>
            `;

            container.innerHTML = table;
        }

        function createScanRow(scan) {
            const badgeClass = scan.classification === 'likely_real' ? 'badge-success' : 
                              scan.classification === 'suspicious' ? 'badge-warning' : 'badge-danger';
            const statusText = scan.classification === 'likely_real' ? 'Authentic' : 
                              scan.classification === 'suspicious' ? 'Suspicious' : 'Fake';
            const confidence = Math.round(scan.confidence_score * 100);
            const date = new Date(scan.timestamp).toLocaleString();

            return `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm font-medium text-gray-900">${scan.product_name}</div>
                        <div class="text-sm text-gray-500">Scan ID: ${scan.scan_id.substring(0, 8)}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="badge ${badgeClass}">${statusText}</span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="flex items-center">
                            <div class="w-16 bg-gray-200 rounded-full h-2 mr-2">
                                <div class="bg-blue-600 h-2 rounded-full" style="width: ${confidence}%"></div>
                            </div>
                            <span class="text-sm text-gray-700">${confidence}%</span>
                        </div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        ${date}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                        <a href="scan-result.html?id=${scan.scan_id}" class="btn btn-secondary btn-sm">View Details</a>
                    </td>
                </tr>
            `;
        }

        function updatePagination() {
            if (totalScans === 0) {
                document.getElementById('pagination').classList.add('hidden');
                return;
            }

            document.getElementById('pagination').classList.remove('hidden');

            const from = (currentPage - 1) * pageSize + 1;
            const to = Math.min(currentPage * pageSize, totalScans);
            const totalPages = Math.ceil(totalScans / pageSize);

            document.getElementById('showing-from').textContent = from;
            document.getElementById('showing-to').textContent = to;
            document.getElementById('total-scans').textContent = totalScans;

            // Update buttons
            document.getElementById('prev-btn').disabled = currentPage === 1;
            document.getElementById('next-btn').disabled = currentPage === totalPages;

            // Page numbers
            const pageNumbers = document.getElementById('page-numbers');
            pageNumbers.innerHTML = '';
            
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    const btn = document.createElement('button');
                    btn.className = `px-3 py-1 rounded ${i === currentPage ? 'bg-primary-600 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}`;
                    btn.textContent = i;
                    btn.addEventListener('click', () => loadScans(i));
                    pageNumbers.appendChild(btn);
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    const span = document.createElement('span');
                    span.textContent = '...';
                    span.className = 'px-2 text-gray-500';
                    pageNumbers.appendChild(span);
                }
            }
        }

        function showError(message) {
            document.getElementById('scans-container').innerHTML = `
                <div class="text-center py-8">
                    <p class="text-red-600">${message}</p>
                </div>
            `;
        }

        // Event listeners
        document.getElementById('filter-btn').addEventListener('click', () => loadScans(1));
        document.getElementById('prev-btn').addEventListener('click', () => loadScans(currentPage - 1));
        document.getElementById('next-btn').addEventListener('click', () => loadScans(currentPage + 1));
        
        // Search on Enter key
        document.getElementById('search-input').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                loadScans(1);
            }
        });

        // Logout
        document.getElementById('logout-btn').addEventListener('click', () => {
            apiClient.logout();
            window.location.href = 'landing.html';
        });

        // Initialize
        loadScans(1);
    </script>
</body>
</html>
