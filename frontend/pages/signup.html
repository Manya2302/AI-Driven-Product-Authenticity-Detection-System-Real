<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - AI Product Authenticity Detection</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body class="bg-gradient">
    <div class="container mx-auto px-4 min-h-screen flex items-center justify-center py-12">
        <div class="auth-card">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-900 mb-2">Create Account</h1>
                <p class="text-gray-600">Join us to start verifying product authenticity</p>
            </div>

            <div id="error-message" class="alert alert-danger hidden mb-4"></div>
            <div id="success-message" class="alert alert-success hidden mb-4"></div>

            <form id="signup-form" class="space-y-6">
                <div class="form-group">
                    <label for="fullname" class="form-label">Full Name</label>
                    <input 
                        type="text" 
                        id="fullname" 
                        name="fullname" 
                        class="form-input" 
                        placeholder="John Doe"
                        required
                        minlength="2"
                    >
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-input" 
                        placeholder="your@email.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        placeholder="••••••••"
                        required
                        minlength="8"
                    >
                    <p class="text-xs text-gray-500 mt-1">Minimum 8 characters, include uppercase, lowercase, number, and special character</p>
                </div>

                <div class="form-group">
                    <label for="confirm-password" class="form-label">Confirm Password</label>
                    <input 
                        type="password" 
                        id="confirm-password" 
                        name="confirm-password" 
                        class="form-input" 
                        placeholder="••••••••"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="flex items-start">
                        <input type="checkbox" id="terms" required class="mt-1 mr-2">
                        <span class="text-sm text-gray-600">
                            I agree to the <a href="#" class="text-primary-600 hover:text-primary-700">Terms of Service</a> 
                            and <a href="#" class="text-primary-600 hover:text-primary-700">Privacy Policy</a>
                        </span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary w-full" id="signup-btn">
                    <span id="btn-text">Create Account</span>
                    <span id="btn-loading" class="hidden">
                        <svg class="animate-spin h-5 w-5 inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        Creating account...
                    </span>
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-gray-600">
                    Already have an account?
                    <a href="login.html" class="text-primary-600 hover:text-primary-700 font-semibold">Sign in</a>
                </p>
            </div>

            <div class="mt-8 pt-6 border-t border-gray-200 text-center">
                <a href="landing.html" class="text-sm text-gray-500 hover:text-gray-700">← Back to Home</a>
            </div>
        </div>
    </div>

    <script src="../js/api-client.js"></script>
    <script>
        const apiClient = new APIClient();
        const form = document.getElementById('signup-form');
        const errorMessage = document.getElementById('error-message');
        const successMessage = document.getElementById('success-message');
        const btnText = document.getElementById('btn-text');
        const btnLoading = document.getElementById('btn-loading');
        const signupBtn = document.getElementById('signup-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Clear previous messages
            errorMessage.classList.add('hidden');
            successMessage.classList.add('hidden');
            
            // Get form data
            const fullname = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            // Validate password match
            if (password !== confirmPassword) {
                errorMessage.textContent = 'Passwords do not match';
                errorMessage.classList.remove('hidden');
                return;
            }
            
            // Validate password strength
            const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
            if (!passwordRegex.test(password)) {
                errorMessage.textContent = 'Password must contain at least 8 characters, including uppercase, lowercase, number, and special character';
                errorMessage.classList.remove('hidden');
                return;
            }
            
            // Show loading state
            btnText.classList.add('hidden');
            btnLoading.classList.remove('hidden');
            signupBtn.disabled = true;

            try {
                const response = await apiClient.signup(fullname, email, password);
                
                // Show success message
                successMessage.textContent = 'Account created successfully! Redirecting to login...';
                successMessage.classList.remove('hidden');
                
                // Redirect to login after 2 seconds
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
                
            } catch (error) {
                // Show error message
                errorMessage.textContent = error.message || 'Signup failed. Please try again.';
                errorMessage.classList.remove('hidden');
                
                // Reset button state
                btnText.classList.remove('hidden');
                btnLoading.classList.add('hidden');
                signupBtn.disabled = false;
            }
        });

        // Check if already logged in
        if (apiClient.isAuthenticated()) {
            window.location.href = 'user-dashboard.html';
        }
    </script>
</body>
</html>
