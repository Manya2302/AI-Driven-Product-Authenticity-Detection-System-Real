version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: authenticity_mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: product_authenticity_db
    volumes:
      - mongodb_data:/data/db
    networks:
      - authenticity_network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: authenticity_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - DATABASE_NAME=product_authenticity_db
      - SECRET_KEY=change-this-secret-key-in-production
      - DEBUG=true
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - models_data:/app/models
    networks:
      - authenticity_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Frontend (Nginx)
  frontend:
    image: nginx:alpine
    container_name: authenticity_frontend
    restart: always
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - authenticity_network

volumes:
  mongodb_data:
  uploads_data:
  models_data:

networks:
  authenticity_network:
    driver: bridge
